import java.util.Properties

plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
def hasReleaseSigning = keystorePropertiesFile.exists()
def allowDebugReleaseSigning = project.findProperty("voicing.allowDebugReleaseSigning") == "true"

if (hasReleaseSigning) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}

android {
    namespace = "com.voicecoding.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.voicecoding.app"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile = file(keystoreProperties["storeFile"])
                storePassword = keystoreProperties["storePassword"]
                keyAlias = keystoreProperties["keyAlias"]
                keyPassword = keystoreProperties["keyPassword"]
            }
        }
    }

    buildTypes {
        release {
            signingConfig = hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
}

gradle.taskGraph.whenReady { taskGraph ->
    def buildingRelease = taskGraph.allTasks.any { task ->
        task.name.toLowerCase().contains("release")
    }
    if (buildingRelease && !hasReleaseSigning && !allowDebugReleaseSigning) {
        throw new GradleException(
            "Release signing is required. Configure key.properties or pass " +
            "-Pvoicing.allowDebugReleaseSigning=true for local-only test builds."
        )
    }
}
