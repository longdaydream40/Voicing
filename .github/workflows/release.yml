name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]  # 等待构建完成

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Extract changelog for this release
        id: changelog
        run: |
          # 从 CHANGELOG.md 提取当前版本的更新日志
          CHANGELOG_VERSION="${VERSION#v}"
          awk "/## \\[$CHANGELOG_VERSION\\]/{flag=1} flag{print} /^---$/{if(flag)exit}" CHANGELOG.md > release_notes.md

          if ! grep -q "^## \\[$CHANGELOG_VERSION\\]" release_notes.md; then
            echo "CHANGELOG.md 中缺少版本 $CHANGELOG_VERSION 的条目"
            exit 1
          fi

          # 添加下载说明
          cat >> release_notes.md << 'EOF'

          ### 📥 下载说明

          | 文件 | 说明 |
          |------|------|
          | `voicing.apk` | Android 安装包 |
          | `voicing.exe` | Windows 电脑端 |

          ### 🚀 快速开始

          1. **电脑端**：下载 EXE 文件，直接运行
          2. **手机端**：下载 APK 文件，安装到手机
          3. **连接**：开启 Windows 移动热点 → 手机连接 → 打开 APK ✅

          ### 📋 系统要求

          - Windows 10/11 (64位)
          - Android 5.0+ (API 21+)

          EOF

          # 设置输出
          {
            echo 'notes<<EOF' >> $GITHUB_OUTPUT
            cat release_notes.md >> $GITHUB_OUTPUT
            echo 'EOF' >> $GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Voicing ${{ env.VERSION }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.0
          cache: true

      - name: Verify Gradle wrapper config
        working-directory: android/voice_coding
        run: |
          echo "=== Checking gradle-wrapper.properties ==="
          cat android/gradle/wrapper/gradle-wrapper.properties
          echo ""
          echo "=== Root level gradle wrapper (if exists) ==="
          cat gradle/wrapper/gradle-wrapper.properties 2>/dev/null || echo "Not found"

      - name: Get dependencies
        working-directory: android/voice_coding
        run: flutter pub get

      - name: Build APK (Release)
        working-directory: android/voice_coding
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv android/voice_coding/build/app/outputs/flutter-apk/app-release.apk android/voice_coding/build/app/outputs/flutter-apk/voicing.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: android/voice_coding/build/app/outputs/flutter-apk/voicing.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: pc
        run: pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        working-directory: pc
        run: |
          pyinstaller --onefile --windowed --name=VoiceCoding --icon=assets/icon.ico --add-data "assets;assets" voice_coding.py

      - name: Rename EXE
        shell: powershell
        run: |
          Copy-Item "pc\dist\VoiceCoding.exe" -Destination "pc\dist\voicing.exe"

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: pc/dist/voicing.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
