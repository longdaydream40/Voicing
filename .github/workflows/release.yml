name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  prepare-release:
    name: Prepare Release Notes
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CHANGELOG_VERSION="${VERSION#v}"
          awk "/## \\[$CHANGELOG_VERSION\\]/{flag=1} flag{print} /^---$/{if(flag)exit}" CHANGELOG.md > release_notes.md

          if ! grep -q "^## \\[$CHANGELOG_VERSION\\]" release_notes.md; then
            echo "CHANGELOG.md 中缺少版本 $CHANGELOG_VERSION 的条目"
            exit 1
          fi

          cat >> release_notes.md << 'EOF'

          ### 下载说明

          | 文件 | 平台 | 说明 |
          |------|------|------|
          | `voicing.apk` | Android | 手机安装包 |
          | `voicing-windows-x64.exe` | Windows | Windows 10/11 (64-bit) |
          | `voicing-macos-arm64.dmg` | macOS | Apple Silicon / arm64 |
          | `voicing-linux-x86_64` | Ubuntu | Ubuntu 22.04 GNOME on X11 |

          ### 系统要求

          - Windows 10/11 (64位)
          - Android 5.0+ (API 21+)
          - macOS 14+（Apple Silicon / arm64，首次打开需右键→打开，并授予 Accessibility 权限）
          - Ubuntu 22.04 GNOME on X11（Wayland 不在支持范围内）

          ### 完整性校验

          - Release 同时提供 `SHA256SUMS.txt`
          - 下载后可先校验 SHA-256 摘要，再安装或运行产物

          EOF

      - name: Upload release notes artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-notes
          path: release_notes.md

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          flutter-version: 3.27.0
          cache: true

      - name: Get dependencies
        working-directory: android/voice_coding
        run: flutter pub get

      - name: Verify Android release signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for secret_name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD
          do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required Android release signing secret: $secret_name"
              exit 1
            fi
          done

      - name: Prepare Android release signing
        working-directory: android/voice_coding/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/release-keystore.jks
          cat > key.properties <<EOF
          storeFile=app/release-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Run Flutter analyze
        working-directory: android/voice_coding
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Flutter tests
        working-directory: android/voice_coding
        run: flutter test

      - name: Build APK
        working-directory: android/voice_coding
        run: flutter build apk --release

      - name: Rename APK
        run: mv android/voice_coding/build/app/outputs/flutter-apk/app-release.apk android/voice_coding/build/app/outputs/flutter-apk/voicing.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: android-apk
          path: android/voice_coding/build/app/outputs/flutter-apk/voicing.apk

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: pc
        run: pip install -r requirements.txt

      - name: Run desktop validation
        working-directory: pc
        run: |
          python -m py_compile voice_coding.py platform_utils.py platform_keyboard.py platform_autostart.py platform_instance.py network_recovery.py voicing_protocol.py
          python -m unittest discover -s tests
          python -c "from voice_coding import calculate_broadcast_addresses, get_all_local_interfaces; interfaces = get_all_local_interfaces(); print('interfaces=', interfaces); print('broadcasts=', calculate_broadcast_addresses(interfaces))"

      - name: Build EXE with PyInstaller
        working-directory: pc
        run: pyinstaller --noconfirm --clean --onefile --windowed --name=Voicing --icon=assets/icon.ico --add-data "assets;assets" voice_coding.py

      - name: Rename EXE
        shell: powershell
        run: Copy-Item "pc\dist\Voicing.exe" -Destination "pc\dist\voicing-windows-x64.exe"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: windows-exe
          path: pc/dist/voicing-windows-x64.exe

  build-macos:
    name: Build macOS App
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: pc
        run: pip install -r requirements.txt

      - name: Run desktop validation
        working-directory: pc
        run: |
          python -m py_compile voice_coding.py platform_utils.py platform_keyboard.py platform_autostart.py platform_instance.py network_recovery.py voicing_protocol.py
          python -m unittest discover -s tests
          python -c "from voice_coding import calculate_broadcast_addresses, get_all_local_interfaces; interfaces = get_all_local_interfaces(); print('interfaces=', interfaces); print('broadcasts=', calculate_broadcast_addresses(interfaces))"

      - name: Generate macOS icon
        working-directory: pc
        run: |
          mkdir -p assets/Voicing.iconset
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          source = Path("assets/icon_1024.png")
          target_dir = Path("assets/Voicing.iconset")
          base = Image.open(source).convert("RGBA")
          outputs = {
              "icon_16x16.png": 16,
              "icon_16x16@2x.png": 32,
              "icon_32x32.png": 32,
              "icon_32x32@2x.png": 64,
              "icon_128x128.png": 128,
              "icon_128x128@2x.png": 256,
              "icon_256x256.png": 256,
              "icon_256x256@2x.png": 512,
              "icon_512x512.png": 512,
              "icon_512x512@2x.png": 1024,
          }
          for file_name, size in outputs.items():
              resized = base.resize((size, size), Image.Resampling.LANCZOS)
              resized.save(target_dir / file_name)
          PY
          iconutil -c icns assets/Voicing.iconset -o assets/icon.icns

      - name: Build macOS app bundle
        working-directory: pc
        run: pyinstaller --noconfirm --clean Voicing-macos.spec

      - name: Create DMG
        working-directory: pc
        run: |
          mkdir -p release
          APP_PATH="$(find dist -maxdepth 1 -name 'Voicing.app' -print -quit)"
          test -n "$APP_PATH"
          hdiutil create -volname "Voicing" -srcfolder "$APP_PATH" -ov -format UDZO "release/voicing-macos-arm64.dmg"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: macos-dmg
          path: pc/release/voicing-macos-arm64.dmg

  build-linux:
    name: Build Linux Desktop Binary
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libdbus-1-3 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install dependencies
        working-directory: pc
        run: pip install -r requirements.txt

      - name: Run desktop validation
        working-directory: pc
        run: |
          python -m py_compile voice_coding.py platform_utils.py platform_keyboard.py platform_autostart.py platform_instance.py network_recovery.py voicing_protocol.py
          python -m unittest discover -s tests
          python -c "from voice_coding import calculate_broadcast_addresses, get_all_local_interfaces; interfaces = get_all_local_interfaces(); print('interfaces=', interfaces); print('broadcasts=', calculate_broadcast_addresses(interfaces))"

      - name: Build Linux executable
        working-directory: pc
        run: pyinstaller --noconfirm --clean --onefile --windowed --name=Voicing --add-data "assets:assets" voice_coding.py

      - name: Rename artifact
        run: cp pc/dist/Voicing pc/dist/voicing-linux-x86_64

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: linux-bin
          path: pc/dist/voicing-linux-x86_64

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - prepare-release
      - build-android
      - build-windows
      - build-macos
      - build-linux

    steps:
      - name: Download release notes artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-notes
          path: release-assets/release-notes

      - name: Download Android artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: android-apk
          path: release-assets/android

      - name: Download Windows artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: windows-exe
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: macos-dmg
          path: release-assets/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: linux-bin
          path: release-assets/linux

      - name: Generate release checksums
        run: |
          cd release-assets
          sha256sum \
            android/voicing.apk \
            windows/voicing-windows-x64.exe \
            macos/voicing-macos-arm64.dmg \
            linux/voicing-linux-x86_64 > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          name: Voicing ${{ needs.prepare-release.outputs.version }}
          body_path: release-assets/release-notes/release_notes.md
          files: |
            release-assets/android/voicing.apk
            release-assets/windows/voicing-windows-x64.exe
            release-assets/macos/voicing-macos-arm64.dmg
            release-assets/linux/voicing-linux-x86_64
            release-assets/SHA256SUMS.txt
          fail_on_unmatched_files: true
          overwrite_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
